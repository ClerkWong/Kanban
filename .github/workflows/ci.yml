name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Web, Worker, and unit checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WRANGLER_LOG_PATH: .wrangler/wrangler.log
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm worker:test
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm mobile:build
      - run: pnpm worker:types:check
      - run: pnpm sync:dry-run
      - run: pnpm sync:dry-run:staging
      - run: git diff --check

  android:
    name: Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - run: pnpm install --frozen-lockfile
      - run: pnpm mobile:sync:android
      - run: ./gradlew :app:assembleDebug
        working-directory: android

  ios:
    name: iOS simulator build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm mobile:sync:ios
      - name: Build iOS simulator app
        run: >-
          xcodebuild
          -workspace ios/App/App.xcworkspace
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -derivedDataPath /tmp/kanban-ios-derived-data
          CODE_SIGNING_ALLOWED=NO
          build
